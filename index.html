<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Parental PRO - MUVN</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: auto; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #1a1a2e; text-align: center; }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        /* Acordeón Alfabético */
        .letter-group { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .letter-header { 
            background: #fff; padding: 12px 20px; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2em;
            transition: background 0.3s;
        }
        .letter-header:hover { background: #f8f9fa; }
        .letter-content { display: none; padding: 0 20px; background: #fff; border-top: 1px solid #eee; }
        .letter-group.active .letter-content { display: block; }
        .letter-group.active .arrow { transform: rotate(180deg); }
        .arrow { transition: transform 0.3s; }

        .site { border-bottom: 1px solid #f0f0f0; padding: 12px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .site:last-child { border-bottom: none; }
        .url { font-weight: 600; flex: 1; min-width: 150px; color: #2c3e50; }
        .status { font-size: 0.9em; color: #666; width: 220px; }
        
        button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .btn-add { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-time { background: #3498db; color: white; }
        .btn-special { background: #8e44ad; color: white; }
        
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-family: inherit; resize: vertical; }
        .instructions { background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 5px solid #2196f3; margin-top: 15px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
        .file-item { background: #fff; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>🚀 MUVN Parental Control v7</h1>
    
    <div class="card">
        <h2>➕ Carga Masiva</h2>
        <p style="font-size: 0.9em; color: #666;">Pega los sitios separados por comas o líneas (ej: tiktok.com, badoo.com):</p>
        <textarea id="bulkUrls" placeholder="tiktok.com, tinder.com, bazoocam.org..."></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="addBulkSites()" class="btn-add">Bloquear Lista Masiva</button>
            <button onclick="preLoadBlocklist()" class="btn-special">Cargar Pack TikTok/Citas</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Sitios Gestionados</h2>
        <div id="alphabetical-list"></div>
    </div>

    <div class="card">
        <h2>⬇️ Archivos del Sistema</h2>
        <div class="file-grid">
            <div class="file-item"><strong>🐍 Motor</strong><br><button onclick="downloadScript()" class="btn-time">parental_control.py</button></div>
            <div class="file-item"><strong>👻 Lanzador</strong><br><button onclick="downloadVbs()" class="btn-special">activar_silencioso.vbs</button></div>
            <div class="file-item"><strong>⚡ Auto-Task</strong><br><button onclick="downloadAutoTask()" class="btn-special" style="background: #e67e22;">programar_inicio.bat</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvQxckDVA4UivGKwQU2da2fBMolOH8UDw",
            authDomain: "muvn-72b44.firebaseapp.com",
            projectId: "muvn-72b44",
            storageBucket: "muvn-72b44.firebasestorage.app",
            messagingSenderId: "365121286388",
            appId: "1:365121286388:web:988306c20c71411e392ea1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function renderSites() {
            db.collection('blocked_sites').orderBy('url').onSnapshot(snap => {
                const container = document.getElementById('alphabetical-list');
                container.innerHTML = '';
                
                const groups = {};
                snap.forEach(doc => {
                    const data = doc.data();
                    const letter = data.url.charAt(0).toUpperCase();
                    if (!groups[letter]) groups[letter] = [];
                    groups[letter].push({ id: doc.id, ...data });
                });

                Object.keys(groups).sort().forEach(letter => {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'letter-group';
                    
                    const header = document.createElement('div');
                    header.className = 'letter-header';
                    header.innerHTML = `<span>Letra ${letter} (${groups[letter].length})</span> <span class="arrow">▼</span>`;
                    header.onclick = () => groupDiv.classList.toggle('active');

                    const content = document.createElement('div');
                    content.className = 'letter-content';

                    groups[letter].forEach(site => {
                        const siteDiv = document.createElement('div');
                        siteDiv.className = 'site';
                        let status = site.blocked ? '🔴 Bloqueado' : '🟢 Libre';
                        const now = new Date();
                        if (site.unblock_until && site.unblock_until.toDate() > now) {
                            status = `⏳ Libre hasta ${site.unblock_until.toDate().toLocaleTimeString()}`;
                        }

                        siteDiv.innerHTML = `
                            <span class="url">${site.url}</span>
                            <span class="status">${status}</span>
                            <button onclick="toggleBlock('${site.id}', ${!site.blocked})">${site.blocked ? 'Desbloquear' : 'Bloquear'}</button>
                            <button onclick="setTimer('${site.id}', 5)" class="btn-time">5 min</button>
                            <button onclick="deleteSite('${site.id}')" class="btn-danger">🗑️</button>
                        `;
                        content.appendChild(siteDiv);
                    });

                    groupDiv.appendChild(header);
                    groupDiv.appendChild(content);
                    container.appendChild(groupDiv);
                });
            });
        }

        async function addBulkSites() {
            const text = document.getElementById('bulkUrls').value;
            const urls = text.split(/[,\n]/).map(u => u.trim()).filter(u => u.length > 0);
            if (urls.length === 0) return;
            for (let url of urls) {
                await db.collection('blocked_sites').add({ url, blocked: true, unblock_until: null });
            }
            document.getElementById('bulkUrls').value = '';
            alert(`${urls.length} sitios agregados.`);
        }

        async function preLoadBlocklist() {
            const list = ['tiktok.com', 'tiktokv.com', 'tiktokcdn.com', 'chatroulette.com', 'bazoocam.org', 'omegle.com', 'tinder.com', 'badoo.com', 'bumble.com'];
            for(let url of list) await db.collection('blocked_sites').add({ url, blocked: true, unblock_until: null });
            alert("Pack cargado.");
        }

        async function toggleBlock(id, val) { await db.collection('blocked_sites').doc(id).update({ blocked: val, unblock_until: null }); }
        async function setTimer(id, min) {
            const until = new Date(Date.now() + min * 60000);
            await db.collection('blocked_sites').doc(id).update({ blocked: false, unblock_until: firebase.firestore.Timestamp.fromDate(until) });
        }
        async function deleteSite(id) { if(confirm("¿Borrar?")) await db.collection('blocked_sites').doc(id).delete(); }

        function downloadScript() {
            const content = `import time, os, sys, ctypes, subprocess
from datetime import datetime
import firebase_admin
from firebase_admin import credentials, firestore

HOSTS = r"C:\\Windows\\System32\\drivers\\etc\\hosts"
CRED = "serviceAccountKey.json"

def sync():
    if not firebase_admin._apps:
        firebase_admin.initialize_app(credentials.Certificate(CRED))
    db = firestore.client()
    docs = db.collection('blocked_sites').stream()
    blocked = []
    now = datetime.now()
    for doc in docs:
        d = doc.to_dict()
        url = d['url']
        until = d.get('unblock_until')
        if until and until.replace(tzinfo=None) > now: continue
        if not d.get('blocked', True): continue
        blocked.append(url)
    
    with open(HOSTS, 'r') as f: lines = f.readlines()
    new = [l for l in lines if "#muvn" not in l and not any(u in l for u in blocked)]
    for u in blocked:
        new.append(f"127.0.0.1 {u} #muvn\\n")
        new.append(f"127.0.0.1 www.{u} #muvn\\n")
    
    with open(HOSTS, 'w') as f: f.writelines(new)
    subprocess.run(["ipconfig", "/flushdns"], creationflags=0x08000000)

if __name__ == "__main__":
    while True:
        try: sync()
        except: pass
        time.sleep(20)
`;
            downloadFile(content, 'parental_control.py', 'text/x-python');
        }

        function downloadVbs() {
            const content = `Set WshShell = CreateObject("WScript.Shell")
WshShell.Run "pythonw.exe parental_control.py", 0
Set WshShell = Nothing`;
            downloadFile(content, 'activar_silencioso.vbs', 'text/plain');
        }

        function downloadAutoTask() {
            const content = `@echo off
cd /d "%~dp0"
schtasks /create /f /tn "MUVN_Control" /tr "wscript.exe \\"%~dp0activar_silencioso.vbs\\"" /sc onlogon /rl highest
wscript.exe "%~dp0activar_silencioso.vbs"
exit`;
            downloadFile(content, 'programar_inicio.bat', 'text/plain');
        }

        function downloadFile(c, f, m) {
            const b = new Blob([c], { type: m });
            const u = window.URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = f;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); window.URL.revokeObjectURL(u);
        }
        renderSites();
    </script>
</body>
</html>
